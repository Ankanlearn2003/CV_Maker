<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Builder - Secure Version</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #1e293b;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --ai-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--secondary); margin: 0; padding: 40px 20px; }
        .container { max-width: 950px; margin: 0 auto; background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--secondary); margin-bottom: 30px; }
        fieldset { border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        legend { font-weight: 700; padding: 0 10px; color: var(--primary); font-size: 1.1rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        input:focus, textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
        .btn-ai { background: var(--ai-grad); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .ai-header { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .ai-status { font-size: 0.85rem; color: #64748b; font-style: italic; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-edu { display: grid; grid-template-columns: 1.2fr 1.2fr 1.2fr 0.7fr 0.7fr; gap: 12px; }
        .dynamic-entry { background: #f1f5f9; padding: 20px; border-radius: 8px; margin-bottom: 15px; position: relative; border-left: 4px solid var(--primary); }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-remove { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 0.75rem;}
        .btn-submit { background: var(--success); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; font-weight: 700; margin-top: 20px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; text-align: center; }
        .template-options { display: flex; gap: 20px; margin-top: 20px; justify-content: center; }
        .template-card { border: 2px solid var(--border); border-radius: 8px; padding: 15px; cursor: pointer; transition: 0.2s; flex: 1; }
        .template-card:hover { border-color: var(--primary); background: #f8fafc; transform: translateY(-3px); }
        .layout-preview { width: 100%; height: 150px; background: #e2e8f0; margin-bottom: 10px; border-radius: 4px; position: relative; overflow: hidden; }

        .t1-layout { background: repeating-linear-gradient(to bottom, #cbd5e1 0, #cbd5e1 10px, transparent 10px, transparent 20px); margin: 20px; height: 100px; }
        .t2-layout { display: flex; height: 100%; }
        .t2-left { width: 35%; background: #cbd5e1; height: 100%; }
        .t2-right { width: 65%; background: repeating-linear-gradient(to bottom, #94a3b8 0, #94a3b8 10px, transparent 10px, transparent 20px); margin: 10px; }
        .btn-cancel { margin-top: 20px; background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>CV Builder Profile</h1>

    <form id="cvForm" action="/export-cv" method="POST">
        <input type="hidden" name="template_choice" id="template_choice" value="1">
        
        <fieldset>
            <legend>Personal Details</legend>
            <div class="grid-2">
                <div class="form-group"><label>Full Name</label><input type="text" id="fullName" name="fullName" required placeholder="Ankan"></div>
                <div class="form-group"><label>Date of Birth</label><input type="date" name="dob"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                <div class="form-group"><label>Phone</label><input type="tel" name="phone"></div>
            </div>
            <div class="form-group"><label>City</label><input type="text" name="city"></div>
            <div class="grid-2">
                <div class="form-group"><label>GitHub URL</label><input type="url" name="github"></div>
                <div class="form-group"><label>LinkedIn URL</label><input type="url" name="linkedin"></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Career Objective</legend>
            <div class="ai-header">
                <button type="button" class="btn-ai" onclick="generateObjective()">✨ Generate with AI</button>
                <span id="aiStatus" class="ai-status">Enter your skills and projects below to trigger AI...</span>
            </div>
            <textarea id="objectiveBox" name="objective" rows="4"></textarea>
        </fieldset>

        <fieldset id="eduFieldset">
            <legend>Education</legend>
            <div id="eduContainer">
                <div class="dynamic-entry">
                    <div class="grid-edu">
                        <div class="form-group"><label>Degree</label><input type="text" name="edu_degree[]"></div>
                        <div class="form-group"><label>Board/Univ</label><input type="text" name="edu_board[]"></div>
                        <div class="form-group"><label>Institution</label><input type="text" name="edu_school[]"></div>
                        <div class="form-group"><label>Year</label><input type="text" name="edu_year[]"></div>
                        <div class="form-group"><label>CGPA/%</label><input type="text" name="edu_grade[]"></div>
                    </div>
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addEdu()">+ Add Education</button>
        </fieldset>

        <fieldset>
            <legend>Other Qualifications</legend>
            <textarea id="qualBox" name="other_qualifications" rows="2" onchange="autoTriggerAI()"></textarea>
        </fieldset>

        <fieldset id="projectFieldset">
            <legend>Projects</legend>
            <div id="projectContainer">
                <div class="dynamic-entry">
                    <div class="form-group"><label>Project Title</label><input type="text" class="p-title-input" name="p_title[]" onchange="autoTriggerAI()"></div>
                    <div class="form-group"><label>Description</label><textarea name="p_desc[]" rows="2" onchange="autoTriggerAI()"></textarea></div>
                </div>
            </div>
            <button type="button" class="btn-add" onclick="addProject()">+ Add Project</button>
        </fieldset>

        <div class="grid-2">
            <fieldset>
                <legend>Skills</legend>
                <textarea id="skillsBox" name="skills" rows="3" onchange="autoTriggerAI()"></textarea>
            </fieldset>
            <fieldset>
                <legend>Language Proficiency</legend>
                <textarea name="languages" rows="3"></textarea>
            </fieldset>
        </div>

        <button type="button" class="btn-submit" onclick="openModal()">Preview & Export CV</button>
    </form>
</div>

<div id="templateModal" class="modal">
    <div class="modal-content">
        <h2>Select CV Layout</h2>
        <div class="template-options">
            <div class="template-card" onclick="submitForm('1')">
                <div class="layout-preview"><div class="t1-layout"></div></div>
                <h3>Standard</h3>
                <p style="font-size: 0.85rem; color: #666;">Single column, traditional layout.</p>
            </div>
            <div class="template-card" onclick="submitForm('2')">
                <div class="layout-preview">
                    <div class="t2-layout"><div class="t2-left"></div><div class="t2-right"></div></div>
                </div>
                <h3>Modern</h3>
                <p style="font-size: 0.85rem; color: #666;">Two columns, professional design.</p>
            </div>
        </div>
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    function autoTriggerAI() {
        const skills = document.getElementById('skillsBox').value;
        if (skills.length > 5) generateObjective();
    }

    async function generateObjective() {
        const status = document.getElementById('aiStatus');
        const objectiveBox = document.getElementById('objectiveBox');
        const payload = {
            fullName: document.getElementById('fullName').value,
            skills: document.getElementById('skillsBox').value,
            quals: document.getElementById('qualBox').value,
            projects: Array.from(document.querySelectorAll('.p-title-input')).map(i => i.value).join(", ")
        };
        status.innerText = "Requesting Backend AI...";
        try {
            const response = await fetch('/generate-objective', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.success) { objectiveBox.value = result.objective; status.innerText = "Objective auto-updated ✨"; }
        } catch (e) { status.innerText = "Server Unreachable."; }
    }

    function addEdu() {
        const container = document.getElementById('eduContainer');
        const div = document.createElement('div');
        div.className = 'dynamic-entry';
        div.innerHTML = `<button type="button" class="btn-remove" onclick="this.parentElement.remove()">Remove</button><div class="grid-edu"><div class="form-group"><label>Degree</label><input type="text" name="edu_degree[]"></div><div class="form-group"><label>Board/Univ</label><input type="text" name="edu_board[]"></div><div class="form-group"><label>Institution</label><input type="text" name="edu_school[]"></div><div class="form-group"><label>Year</label><input type="text" name="edu_year[]"></div><div class="form-group"><label>CGPA/%</label><input type="text" name="edu_grade[]"></div></div>`;
        container.appendChild(div);
    }

    function addProject() {
        const container = document.getElementById('projectContainer');
        const div = document.createElement('div');
        div.className = 'dynamic-entry';
        div.innerHTML = `<button type="button" class="btn-remove" onclick="this.parentElement.remove()">Remove</button><div class="form-group"><label>Project Title</label><input type="text" class="p-title-input" name="p_title[]" onchange="autoTriggerAI()"></div><div class="form-group"><label>Description</label><textarea name="p_desc[]" rows="2" onchange="autoTriggerAI()"></textarea></div>`;
        container.appendChild(div);
    }

    function openModal() {
        const form = document.getElementById('cvForm');
        if (form.checkValidity()) {
            document.getElementById('templateModal').style.display = 'flex';
        } else {
            form.reportValidity();
        }
    }

    function closeModal() { document.getElementById('templateModal').style.display = 'none'; }

    function submitForm(templateId) {
        document.getElementById('template_choice').value = templateId;
        document.getElementById('cvForm').submit();
    }
</script>
</body>
</html>
